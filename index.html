<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>My AR Scene</title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
<style>
  #overlay {
    position: fixed;
    top: 1rem; left: 1rem;
    z-index: 10;
    color: #000;
    font-family: sans-serif;
    background: rgba(255,255,255,0.55);
    padding: 0.75rem 1rem;
    border-radius: 8px;
    max-width: 220px;
  }
</style>
    
  </head>
  <body style="margin:0; overflow:hidden;">
    <div id="overlay">
  <h2>My AR Project</h2>
  <p>Point at the Hiro marker to see the 3D model!</p>
</div>
   <a-scene embedded arjs>
  <a-box position="-1 0 -5" rotation="0 45 0" color="#4CC3D9">
  <a-marker preset="hiro">
    <!-- 3D content goes here -->

<a-gltf-model
  src="https://cdn.jsdelivr.net/gh/KhronosGroup/glTF-Sample-Assets/Models/Duck/glTF-Binary/Duck.glb"
  position="0 0 0"
  rotation="0 0 0"
  scale="0.5 0.5 0.5"
   animation="property: rotation;
             to: 360 360 0;
             loop: true;
             dur: 3200;
             easing: linear;"
   animation__2="property: position;
             to: 0 5 0;
             dir: alternate;
             loop: true;
             dur: 1300">
</a-gltf-model>
   
  </a-marker>
  <a-entity camera></a-entity>
</a-scene>

  </body>
</html>
